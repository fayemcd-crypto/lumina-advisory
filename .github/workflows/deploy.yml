nname: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Force Update Hetzner
        run: |
          sudo apt-get install -y sshpass
          export SSHPASS="${{ secrets.VPS_PASSWORD }}"
          sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@178.104.70.62 "cd /var/www/lumina && git fetch --all && git reset --hard origin/main"
