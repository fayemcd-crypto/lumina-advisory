name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Update Hetzner
        run: |
          sudo apt-get install -y sshpass
          sshpass -p "${{ secrets.VPS_PASSWORD }}" ssh -o StrictHostKeyChecking=no root@178.104.70.62 "
            if [ -d '/var/www/lumina' ]; then
              cd /var/www/lumina && git fetch --all && git reset --hard origin/main
            else
              echo 'Folder /var/www/lumina not found!' && exit 1
            fi
          "
